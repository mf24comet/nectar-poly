services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nectar_poly
      POSTGRES_USER: nectar
      POSTGRES_PASSWORD: nectar_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nectar -d nectar_poly"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "3000"
      APP_DATABASE_URL: "postgres://nectar:nectar_dev_password@postgres:5432/nectar_poly"
      APP_AUTH_USERNAME: "${APP_AUTH_USERNAME:-devuser}"
      APP_AUTH_PASSWORD: "${APP_AUTH_PASSWORD:-devpass}"
      APP_LOG_LEVEL: "info"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
