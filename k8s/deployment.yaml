apiVersion: apps/v1
kind: Deployment
metadata:
  name: nectar-poly
  namespace: nectar-poly
  labels:
    app.kubernetes.io/name: nectar-poly
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nectar-poly
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nectar-poly
    spec:
      serviceAccountName: nectar-poly
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: nectar-poly
          image: nectar-poly:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: APP_HOST
              value: "0.0.0.0"
            - name: APP_PORT
              value: "3000"
            - name: APP_LOG_LEVEL
              value: "info"
            - name: APP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nectar-poly-secrets
                  key: database-url
            - name: APP_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nectar-poly-secrets
                  key: auth-username
            - name: APP_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nectar-poly-secrets
                  key: auth-password
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nectar-poly
  namespace: nectar-poly
  labels:
    app.kubernetes.io/name: nectar-poly
automountServiceAccountToken: false
